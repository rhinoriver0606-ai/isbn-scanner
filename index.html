<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby-xrf8gEb0AAVeHBpiykHl-Hfz-6cPGsyXakAg9EeymnnaD5E7V7H9XCyELwzZbuMD/exec";

let books = [];
let lastISBN = "";
let lastTime = 0;

/* ★追加 */
let scannedBook = null;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="shelfPage") loadBooks();
}

async function loadBooks(){
  const res = await fetch(GAS_URL);
  books = await res.json();
  renderSeries();
}

function getFiltered(){
  const s = document.getElementById("f_status").value;
  const t = document.getElementById("f_type").value;
  const l = document.getElementById("f_location").value;

  return books.filter(b =>
    (s==="all"||b.status===s) &&
    (t==="all"||b.type===t) &&
    (l==="all"||b.location===l)
  );
}

function renderSeries(){
  const data = getFiltered();
  const map = {};

  data.forEach(b=>{
    const key = b.series?.trim() || "その他";
    if(!map[key]) map[key]=[];
    map[key].push(b);
  });

  let html = "";

  Object.keys(map).forEach(series=>{
    const items = map[series]
      .sort((a,b)=>Number(a.volume)-Number(b.volume));

    html += `
      <h3 style="margin:10px 0">${series}</h3>
      <div class="carousel">
        ${items.map(b=>`
          <div class="card">
            <img src="${b.thumbnail || ''}">
            <div style="font-size:10px">${b.volume||""}</div>
          </div>
        `).join("")}
      </div>
    `;
  });

  document.getElementById("seriesGrid").innerHTML = html;
}

function openSeries(series){
  const items = books
    .filter(b=>b.series===series)
    .sort((a,b)=>Number(a.volume)-Number(b.volume));

  document.getElementById("volumeList").innerHTML =
    items.map(b=>`
      <div class="volume">
        <img src="${b.thumbnail || ''}">
        <div>${b.volume||""}巻 ${b.title}</div>
      </div>
    `).join("");

  show("detailPage");
}

function back(){
  show("shelfPage");
}

async function send(p){
  await fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams(p)
  });
  loadBooks();
}

/* 手動登録（変更なし） */
function manualAdd(){
  const loc = document.getElementById("location").value;
  const typ = document.getElementById("type").value;

  send({
    title: manualTitle.value,
    author: manualAuthor.value,
    location: loc,
    type: typ,
    isbn:""
  });
}

/* ★追加：登録処理 */
function registerScanned(){
  if(!scannedBook) return;

  const loc = document.getElementById("location").value;
  const typ = document.getElementById("type").value;

  send({
    ...scannedBook,
    location: loc,
    type: typ
  });

  result.innerHTML = "登録しました！";
  scannedBook = null;
}

/* ★修正：スキャン処理 */
document.getElementById("startBtn").onclick=async()=>{
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

  const reader = new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoDevice(null,video,async(res)=>{
    if(!res)return;

    const isbn=res.getText();
    const now=Date.now();
    if(isbn===lastISBN&&now-lastTime<5000)return;

    lastISBN=isbn;
    lastTime=now;

    const book = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`)
      .then(r=>r.json())
      .then(d=>d.items?.[0]?.volumeInfo);

    if(!book)return;

    /* ★ここが変更ポイント */
    scannedBook = {
      isbn,
      title:book.title || "",
      author:book.authors?.join(",") || "",
      publisher:book.publisher || "",
      thumbnail:book.imageLinks?.thumbnail || ""
    };

    result.innerHTML = `
      <div style="padding:10px">
        <img src="${scannedBook.thumbnail}" style="width:80px"><br>
        <b>${scannedBook.title}</b><br>
        ${scannedBook.author || ""}<br><br>
        <button onclick="registerScanned()">この内容で登録</button>
      </div>
    `;
  });
};
</script>
