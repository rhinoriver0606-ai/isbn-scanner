<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>シリーズ本棚</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding-bottom: 60px;
}

h2 {
  text-align: center;
  padding: 10px;
}

/* ===== 1階層（シリーズ一覧） ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
  padding: 10px;
}

.series-card {
  background: #1e1e1e;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
}

.series-title {
  font-weight: bold;
  margin-top: 5px;
  font-size: 14px;
}

.count {
  font-size: 12px;
  color: #aaa;
}

/* 表紙 */
.series-cover {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 6px;
}

/* ===== 2階層（巻一覧） ===== */
.back {
  padding: 10px;
  background: #222;
  cursor: pointer;
  text-align: center;
}

.volumes {
  padding: 10px;
}

.volume {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}

.volume img {
  width: 50px;
  height: 70px;
  object-fit: cover;
  border-radius: 4px;
}

.meta {
  font-size: 12px;
  color: #ccc;
}

/* 非表示制御 */
.page {
  display: none;
}

.page.active {
  display: block;
}
</style>
</head>

<body>

<h2>📚 シリーズ本棚</h2>

<!-- 1階層 -->
<div id="homePage" class="page active">
  <div id="seriesGrid" class="grid"></div>
</div>

<!-- 2階層 -->
<div id="detailPage" class="page">
  <div class="back" onclick="back()">← 戻る</div>
  <div id="volumeList" class="volumes"></div>
</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbwNY_HLbY0FQ54v-Sz1sRNz4k28qltCgL19-4fwcaKQL94pPy7kAs9MtC6PBn3OFTOyZw/exec";

let books = [];

/* データ取得 */
async function loadBooks() {
  const res = await fetch(GAS_URL);
  books = await res.json();

  renderSeries();
}

/* シリーズごとにまとめる */
function groupBySeries(data) {
  const map = {};

  data.forEach(b => {
    const key = (b.series && b.series.trim() !== "")
      ? b.series
      : "その他";

    if (!map[key]) map[key] = [];
    map[key].push(b);
  });

  return map;
}

/* 巻順ソート */
function sortVolume(a, b) {
  return Number(a.volume || 0) - Number(b.volume || 0);
}

/* 1階層表示 */
function renderSeries() {
  const grouped = groupBySeries(books);

  document.getElementById("seriesGrid").innerHTML =
    Object.keys(grouped).map(series => {

      const items = grouped[series];

      return `
        <div class="series-card" onclick="openSeries('${series}')">
          <img class="series-cover" src="${items[0].thumbnail || 'https://via.placeholder.com/200x300'}">
          <div class="series-title">${series}</div>
          <div class="count">${items.length}冊</div>
        </div>
      `;
    }).join("");
}

/* 2階層表示 */
function openSeries(series) {
  const items = books
    .filter(b => b.series === series)
    .sort(sortVolume);

  document.getElementById("volumeList").innerHTML =
    items.map(b => `
      <div class="volume">
        <img src="${b.thumbnail || 'https://via.placeholder.com/50x70'}">
        <div class="meta">
          ${b.volume ? b.volume + "巻" : ""}<br>
          ${b.title}
        </div>
      </div>
    `).join("");

  document.getElementById("homePage").classList.remove("active");
  document.getElementById("detailPage").classList.add("active");
}

/* 戻る */
function back() {
  document.getElementById("detailPage").classList.remove("active");
  document.getElementById("homePage").classList.add("active");
}

/* 起動 */
loadBooks();
</script>

</body>
</html>
