<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISBNスキャナー</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 10px;
    }

    video {
      width: 100%;
      max-width: 400px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
    }

    #result {
      font-size: 20px;
      margin-top: 10px;
      color: green;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h2>ISBNバーコードスキャナー</h2>

  <button id="startBtn">カメラ起動</button>

  <video id="video" autoplay playsinline></video>

  <div id="result">未スキャン</div>

  <!-- ZXing -->
  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('video');
    const result = document.getElementById('result');

    let codeReader;
    let stream;

    // 🔥 ここを自分のGAS URLに変更
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzmnsy8fdjto6UvilZDQWYQNRxbo7IkVmbKzBTG8ZZ8LSm2t3BQZ5Kk3QyxhJ2_Md-MWA/exec";

    // スプレッドシートへ送信
    async function sendToSheet(isbn) {
      try {
        await fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ isbn }),
          headers: {
            "Content-Type": "application/json"
          }
        });

        console.log("送信成功:", isbn);
      } catch (err) {
        console.error("送信失敗:", err);
      }
    }

    startBtn.addEventListener('click', async () => {
      try {
        // カメラ起動
        stream = await navigator.mediaDevices.getUserMedia({
          video: {
            facingMode: "environment"
          }
        });

        video.srcObject = stream;

        // ZXing開始
        codeReader = new ZXing.BrowserMultiFormatReader();

        codeReader.decodeFromVideoDevice(
          null,
          video,
          (res, err) => {
            if (res) {
              const isbn = res.getText();

              result.textContent = "ISBN: " + isbn;

              // 🔥 スプレッドシートへ送信
              sendToSheet(isbn);
            }

            if (err && !(err instanceof ZXing.NotFoundException)) {
              console.error(err);
            }
          }
        );

      } catch (err) {
        alert("カメラ起動失敗: " + err);
        console.error(err);
      }
    });
  </script>
</body>
</html>
