<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>蔵書スキャナー</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 10px;
    }

    video {
      width: 100%;
      max-width: 400px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    #result {
      font-size: 16px;
      margin-top: 10px;
      color: green;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h2>蔵書スキャナー</h2>

  <button id="startBtn">カメラ起動</button>

  <video id="video" autoplay playsinline></video>

  <div id="result">未スキャン</div>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxQlXItZl6gLSTvTj7LvxQC1OiBJa-WXruLLecbwUFtrvufGWwhb-eyJ4Rj-0ouuPGJSQ/exec";

    const startBtn = document.getElementById("startBtn");
    const video = document.getElementById("video");
    const result = document.getElementById("result");

    let lastISBN = "";
    let lastTime = 0;

    // 🔥 Google Books API
    async function fetchBookInfo(isbn) {
      try {
        const url = `https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`;
        const res = await fetch(url);
        const data = await res.json();

        if (!data.items) return null;

        const info = data.items[0].volumeInfo;

        return {
          title: info.title || "",
          author: (info.authors || []).join(", "),
          publisher: info.publisher || ""
        };

      } catch (err) {
        console.error("書籍取得失敗:", err);
        return null;
      }
    }

    // 🔥 GAS送信
    async function sendToSheet(payload) {
      try {
        const formData = new URLSearchParams();

        Object.keys(payload).forEach(key => {
          formData.append(key, payload[key]);
        });

        const res = await fetch(GAS_URL, {
          method: "POST",
          body: formData
        });

        console.log(await res.text());

      } catch (err) {
        console.error("送信失敗:", err);
      }
    }

    startBtn.addEventListener("click", async () => {
      const stream = await navigator.mediaDevices.getUserMedia({
        video: { facingMode: "environment" }
      });

      video.srcObject = stream;

      const codeReader = new ZXing.BrowserMultiFormatReader();

      codeReader.decodeFromVideoDevice(null, video, async (res) => {
        if (!res) return;

        const isbn = res.getText();

        const now = Date.now();

        if (isbn === lastISBN && now - lastTime < 3000) return;

        lastISBN = isbn;
        lastTime = now;

        result.textContent = "ISBN: " + isbn + "（取得中...）";

        // 🔥 書籍情報取得
        const book = await fetchBookInfo(isbn);

        if (!book) {
          result.textContent = "書籍情報なし: " + isbn;
          return;
        }

        result.textContent =
          `ISBN: ${isbn}\n` +
          `タイトル: ${book.title}\n` +
          `著者: ${book.author}\n` +
          `出版社: ${book.publisher}`;

        // 🔥 GAS送信
        await sendToSheet({
          isbn,
          title: book.title,
          author: book.author,
          publisher: book.publisher
        });
      });
    });
  </script>
</body>
</html>
