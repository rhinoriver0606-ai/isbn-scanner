<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">

<title>蔵書アプリ（PWA版）</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding-bottom: 70px;
}

h2 {
  text-align: center;
  padding: 10px;
}

.page { display: none; padding: 10px; }
.page.active { display: block; }

video {
  width: 100%;
  border-radius: 10px;
}

.filter {
  display: flex;
  gap: 6px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

select, input, button {
  padding: 6px;
  font-size: 14px;
}

.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.series-card {
  background: #1e1e1e;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
}

.series-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 6px;
}

.series-title {
  font-size: 13px;
  margin-top: 5px;
}

.volume {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}

.volume img {
  width: 50px;
  height: 70px;
  object-fit: cover;
  border-radius: 4px;
}

.tabbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #222;
}

.tabbar button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: white;
}

.carousel {
  display: flex;
  overflow-x: auto;
  gap: 8px;
  padding: 10px;
  scroll-snap-type: x mandatory;
}

.carousel::-webkit-scrollbar {
  display: none;
}

.card {
  flex: 0 0 auto;
  width: 90px;
  scroll-snap-align: start;
}

.card img {
  width: 90px;
  height: 130px;
  object-fit: cover;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>📚 蔵書アプリ</h2>

<div id="scanPage" class="page active">

  <button id="startBtn">カメラ起動</button>

  <select id="location">
    <option value="自宅">自宅</option>
    <option value="実家">実家</option>
  </select>

  <select id="type">
    <option value="商業誌">商業誌</option>
    <option value="同人誌">同人誌</option>
  </select>

  <video id="video" autoplay playsinline></video>
  <div id="result"></div>

  <hr>

  <h3>手動登録（ISBNなし）</h3>
  <input id="manualTitle" placeholder="タイトル"><br>
  <input id="manualAuthor" placeholder="著者"><br>
  <button onclick="manualAdd()">登録</button>
</div>

<div id="shelfPage" class="page">

  <div class="filter">
    <select id="f_status">
      <option value="all">すべて</option>
      <option value="未読">未読</option>
      <option value="読了">読了</option>
    </select>

    <select id="f_type">
      <option value="all">すべて</option>
      <option value="商業誌">商業誌</option>
      <option value="同人誌">同人誌</option>
    </select>

    <select id="f_location">
      <option value="all">すべて</option>
      <option value="自宅">自宅</option>
      <option value="実家">実家</option>
    </select>
  </div>

  <div id="seriesGrid" class="grid"></div>
</div>

<div id="detailPage" class="page">
  <button onclick="back()">← 戻る</button>
  <div id="volumeList"></div>
</div>

<div class="tabbar">
  <button onclick="show('scanPage')">📷</button>
  <button onclick="show('shelfPage')">📚</button>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycby-xrf8gEb0AAVeHBpiykHl-Hfz-6cPGsyXakAg9EeymnnaD5E7V7H9XCyELwzZbuMD/exec";

let books = [];
let lastISBN = "";
let lastTime = 0;

if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}

function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");
  if(id==="shelfPage") loadBooks();
}

async function loadBooks(){
  const res = await fetch(GAS_URL);
  books = await res.json();
  renderSeries();
}

function getFiltered(){
  const s = document.getElementById("f_status").value;
  const t = document.getElementById("f_type").value;
  const l = document.getElementById("f_location").value;

  return books.filter(b =>
    (s==="all"||b.status===s) &&
    (t==="all"||b.type===t) &&
    (l==="all"||b.location===l)
  );
}

function renderSeries(){
  const data = getFiltered();
  const map = {};

  data.forEach(b=>{
    const key = b.series?.trim() || "その他";
    if(!map[key]) map[key]=[];
    map[key].push(b);
  });

  let html = "";

  Object.keys(map).forEach(series=>{
    const items = map[series]
      .sort((a,b)=>Number(a.volume)-Number(b.volume));

    html += `
      <h3 style="margin:10px 0">${series}</h3>
      <div class="carousel">
        ${items.map(b=>`
          <div class="card">
            <img src="${b.thumbnail || ''}">
            <div style="font-size:10px">${b.volume||""}</div>
          </div>
        `).join("")}
      </div>
    `;
  });

  document.getElementById("seriesGrid").innerHTML = html;
}

function openSeries(series){
  const items = books
    .filter(b=>b.series===series)
    .sort((a,b)=>Number(a.volume)-Number(b.volume));

  document.getElementById("volumeList").innerHTML =
    items.map(b=>`
      <div class="volume">
        <img src="${b.thumbnail || ''}">
        <div>${b.volume||""}巻 ${b.title}</div>
      </div>
    `).join("");

  show("detailPage");
}

function back(){
  show("shelfPage");
}

async function send(p){
  await fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams(p)
  });
  loadBooks();
}

/* ✅ 修正済 */
function manualAdd(){
  const loc = document.getElementById("location").value;
  const typ = document.getElementById("type").value;

  send({
    title: manualTitle.value,
    author: manualAuthor.value,
    location: loc,
    type: typ,
    isbn:""
  });
}

/* ✅ 修正済 */
document.getElementById("startBtn").onclick=async()=>{
  const stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:"environment"}
  });

  video.srcObject = stream;

  const reader = new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoDevice(null,video,async(res)=>{
    if(!res)return;

    const isbn=res.getText();
    const now=Date.now();
    if(isbn===lastISBN&&now-lastTime<5000)return;

    lastISBN=isbn;
    lastTime=now;

    const book = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`)
      .then(r=>r.json())
      .then(d=>d.items?.[0]?.volumeInfo);

    if(!book)return;

    result.textContent=book.title;

    const loc = document.getElementById("location").value;
    const typ = document.getElementById("type").value;

    send({
      isbn,
      title:book.title || "",
      author:book.authors?.join(",") || "",
      publisher:book.publisher || "",
      thumbnail:book.imageLinks?.thumbnail || "",
      location: loc,
      type: typ
    });
  });
};
</script>

</body>
</html>
