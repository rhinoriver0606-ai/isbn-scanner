<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>蔵書アプリ</title>

<style>
body {
  font-family: sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
}

video {
  width: 100%;
  border-radius: 10px;
  margin-bottom: 10px;
}

#result {
  white-space: pre-line;
  font-size: 14px;
  color: green;
}

.card {
  background: white;
  border-radius: 12px;
  margin: 10px 0;
  display: flex;
  overflow: hidden;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

.card img {
  width: 80px;
  object-fit: cover;
}

.card-body {
  flex: 1;
  padding: 10px;
}

.title {
  font-weight: bold;
}

.meta {
  font-size: 12px;
  color: #666;
}

.btns {
  margin-top: 6px;
  display: flex;
  gap: 5px;
}

button {
  font-size: 12px;
  padding: 4px 8px;
}
</style>
</head>

<body>

<h2>📚 蔵書アプリ</h2>

<button id="startBtn">カメラ起動</button>
<video id="video" autoplay playsinline></video>

<div id="result"></div>

<hr>

<div id="list"></div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbyGY7-Mh8QKw4FYBIYllCCc2leTID6A_dGYXasily2zS7ubopDNUnKLYCaQWYP1U7ndTQ/exec";

let lastISBN = "";
let lastTime = 0;

// 📘 表紙取得
function getCover(isbn) {
  return `https://covers.openlibrary.org/b/isbn/${isbn}-M.jpg`;
}

// 📚 書籍API
async function fetchBookInfo(isbn) {
  const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
  const data = await res.json();
  if (!data.items) return null;

  const v = data.items[0].volumeInfo;

  return {
    title: v.title || "",
    author: (v.authors || []).join(", "),
    publisher: v.publisher || ""
  };
}

// 📤 保存
async function sendToSheet(p) {
  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
    },
    body: new URLSearchParams(p)
  });

  loadBooks();
}

// 📥 一覧取得
async function loadBooks() {
  const res = await fetch(GAS_URL);
  const data = await res.json();
  render(data);
}

// 🧱 描画
function render(data) {
  document.getElementById("list").innerHTML = data.map(b => `
    <div class="card">
      <img src="${getCover(b.isbn)}" onerror="this.src='https://via.placeholder.com/80'">
      <div class="card-body">
        <div class="title">${b.title}</div>
        <div class="meta">著者: ${b.author}</div>
        <div class="meta">出版社: ${b.publisher}</div>
        <div class="meta">状態: ${b.status}</div>

        <div class="btns">
          <button onclick="toggleStatus(${b.id}, '${b.status}')">
            読了切替
          </button>
          <button onclick="deleteBook(${b.id})">
            削除
          </button>
        </div>
      </div>
    </div>
  `).join("");
}

// 🔄 読了切替
async function toggleStatus(id, status) {
  await fetch(GAS_URL + "?action=toggle&id=" + id);
  loadBooks();
}

// 🗑 削除
async function deleteBook(id) {
  await fetch(GAS_URL + "?action=delete&id=" + id);
  loadBooks();
}

// 📡 カメラ
document.getElementById("startBtn").addEventListener("click", async () => {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  document.getElementById("video").srcObject = stream;

  const reader = new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoDevice(null, document.getElementById("video"), async (res) => {
    if (!res) return;

    const isbn = res.getText();
    const now = Date.now();

    if (isbn === lastISBN && now - lastTime < 5000) return;

    lastISBN = isbn;
    lastTime = now;

    document.getElementById("result").textContent = "取得中...";

    const book = await fetchBookInfo(isbn);
    if (!book) return;

    document.getElementById("result").textContent = book.title;

    await sendToSheet({
      isbn,
      title: book.title,
      author: book.author,
      publisher: book.publisher
    });
  });
});

loadBooks();
</script>

</body>
</html>
