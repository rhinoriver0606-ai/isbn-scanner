<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>シリーズ本棚</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding-bottom: 60px;
}

h2 {
  text-align: center;
  padding: 10px;
}

/* 本棚 */
.shelf {
  padding: 10px;
}

/* 作品カード */
.series-card {
  background: #1e1e1e;
  margin-bottom: 12px;
  border-radius: 10px;
  overflow: hidden;
  box-shadow: 0 3px 10px rgba(0,0,0,0.5);
}

.series-header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px;
  cursor: pointer;
  background: #222;
}

.series-title {
  font-weight: bold;
}

.count {
  font-size: 12px;
  color: #aaa;
}

/* 巻一覧 */
.volumes {
  display: none;
  padding: 10px;
}

.volume {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
  align-items: center;
}

.volume img {
  width: 50px;
  height: 70px;
  object-fit: cover;
  border-radius: 4px;
}

.meta {
  font-size: 12px;
  color: #ccc;
}

.single {
  display: flex;
  gap: 10px;
  padding: 10px;
  align-items: center;
}

.single img {
  width: 60px;
  height: 90px;
  object-fit: cover;
  border-radius: 6px;
}
</style>
</head>

<body>

<h2>📚 シリーズ本棚</h2>

<div id="shelf" class="shelf">読み込み中...</div>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxulcJMiF65Dw9_dftVUUdk3tdGllap7EnaGFsWZ2N8lyy48BmM2AuurdC3f2LcnJr1gQ/exec";

let books = [];

/* データ取得 */
async function loadBooks() {
  const res = await fetch(GAS_URL);
  books = await res.json();

  renderShelf();
}

/* グループ化 */
function groupBooks(data) {
  const map = {};

  data.forEach(b => {
    const series = (b.series && b.series.trim() !== "" && b.series !== "同人誌")
      ? b.series
      : "__single__" + b.id;

    if (!map[series]) map[series] = [];
    map[series].push(b);
  });

  return map;
}

/* 巻ソート */
function sortVolumes(list) {
  return list.sort((a, b) => {
    const va = Number(a.volume || 0);
    const vb = Number(b.volume || 0);
    return va - vb;
  });
}

/* 描画 */
function renderShelf() {
  const grouped = groupBooks(books);

  const html = Object.keys(grouped).map(key => {

    const items = sortVolumes(grouped[key]);

    // 単巻（同人誌など）
    if (key.startsWith("__single__")) {
      const b = items[0];

      return `
      <div class="series-card">
        <div class="single">
          <img src="${b.thumbnail || 'https://via.placeholder.com/60x90'}">
          <div>
            <div class="series-title">${b.title}</div>
            <div class="meta">${b.author || ""}</div>
          </div>
        </div>
      </div>`;
    }

    // シリーズ
    return `
    <div class="series-card">
      <div class="series-header" onclick="toggle(this)">
        <div class="series-title">${key}</div>
        <div class="count">${items.length}冊</div>
      </div>

      <div class="volumes">
        ${items.map(v => `
          <div class="volume">
            <img src="${v.thumbnail || 'https://via.placeholder.com/50x70'}">
            <div class="meta">
              ${v.volume ? v.volume + "巻" : ""}<br>
              ${v.title}
            </div>
          </div>
        `).join("")}
      </div>
    </div>`;
  }).join("");

  document.getElementById("shelf").innerHTML = html;
}

/* 開閉 */
function toggle(el) {
  const body = el.nextElementSibling;
  body.style.display = body.style.display === "block" ? "none" : "block";
}

/* 起動 */
loadBooks();
</script>

</body>
</html>
