<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>蔵書アプリ</title>

<style>
body {
  font-family: sans-serif;
  background: #f2f2f2;
  margin: 0;
  padding-bottom: 60px;
}

h2 {
  text-align: center;
}

/* 画面 */
.page {
  display: none;
  padding: 10px;
}
.page.active {
  display: block;
}

/* カメラ */
video {
  width: 100%;
  border-radius: 10px;
}

/* 本棚 */
.grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 10px;
}

.book {
  background: white;
  border-radius: 8px;
  padding: 5px;
  text-align: center;
}

.book img {
  width: 100%;
  height: 120px;
  object-fit: cover;
}

.title {
  font-size: 12px;
  margin-top: 4px;
}

/* タブ */
.tabbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  background: white;
  display: flex;
  border-top: 1px solid #ccc;
}

.tabbar button {
  flex: 1;
  padding: 10px;
  border: none;
  background: none;
}
</style>
</head>

<body>

<h2>📚 蔵書アプリ</h2>

<!-- スキャン -->
<div id="scanPage" class="page active">
  <button id="startBtn">カメラ起動</button>
  <video id="video" autoplay playsinline></video>
  <div id="result"></div>
</div>

<!-- 本棚 -->
<div id="shelfPage" class="page">
  <div id="shelf" class="grid"></div>
</div>

<!-- タブ -->
<div class="tabbar">
  <button onclick="showPage('scanPage')">📷 スキャン</button>
  <button onclick="showPage('shelfPage')">📚 本棚</button>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>

const GAS_URL = "https://script.google.com/macros/s/AKfycbzot1qtoq5hYX9Y-edkYb_pNCfQ4DQ82jWf7L150VOoLuaermyQznGTwWYTA4I-ayhplQ/exec";

let lastISBN = "";
let lastTime = 0;
let books = [];

/* 画面切替 */
function showPage(id) {
  document.querySelectorAll(".page").forEach(p => p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if (id === "shelfPage") loadBooks();
}

/* 書籍API */
async function fetchBookInfo(isbn) {
  const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
  const data = await res.json();
  if (!data.items) return null;

  const v = data.items[0].volumeInfo;

  return {
    title: v.title || "",
    author: (v.authors || []).join(", "),
    publisher: v.publisher || "",
    thumbnail: v.imageLinks?.thumbnail || ""
  };
}

/* 保存 */
async function sendToSheet(p) {
  await fetch(GAS_URL, {
    method: "POST",
    headers: {
      "Content-Type": "application/x-www-form-urlencoded;charset=UTF-8"
    },
    body: new URLSearchParams(p)
  });
}

/* 取得 */
async function loadBooks() {
  const res = await fetch(GAS_URL);
  books = await res.json();
  renderShelf();
}

/* 本棚描画 */
function renderShelf() {
  document.getElementById("shelf").innerHTML = books.map(b => `
    <div class="book">
      <img src="${b.thumbnail || 'https://via.placeholder.com/100x140'}">
      <div class="title">${b.title || ""}</div>
    </div>
  `).join("");
}

/* カメラ */
document.getElementById("startBtn").addEventListener("click", async () => {

  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });

  const video = document.getElementById("video");
  video.srcObject = stream;

  const reader = new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoDevice(null, video, async (res) => {
    if (!res) return;

    const isbn = res.getText();
    const now = Date.now();

    if (isbn === lastISBN && now - lastTime < 5000) return;

    lastISBN = isbn;
    lastTime = now;

    const book = await fetchBookInfo(isbn);
    if (!book) return;

    document.getElementById("result").textContent = book.title;

    await sendToSheet({
      isbn,
      title: book.title,
      author: book.author,
      publisher: book.publisher,
      thumbnail: book.thumbnail
    });
  });
});

</script>

</body>
</html>
