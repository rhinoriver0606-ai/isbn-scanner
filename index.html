<!DOCTYPE html>
<html lang="ja">
<head>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#111111">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>蔵書アプリ（統合版）</title>

<style>
body {
  font-family: sans-serif;
  background: #111;
  color: white;
  margin: 0;
  padding-bottom: 70px;
}

/* ===== ヘッダー ===== */
h2 {
  text-align: center;
  padding: 10px;
}

/* ===== 画面切替 ===== */
.page { display: none; padding: 10px; }
.page.active { display: block; }

/* ===== カメラ ===== */
video {
  width: 100%;
  border-radius: 10px;
}

/* ===== フィルター ===== */
.filter {
  display: flex;
  gap: 5px;
  flex-wrap: wrap;
  margin-bottom: 10px;
}

select {
  padding: 5px;
}

/* ===== 本棚（シリーズ） ===== */
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 10px;
}

.series-card {
  background: #1e1e1e;
  border-radius: 10px;
  padding: 10px;
  cursor: pointer;
  text-align: center;
}

.series-card img {
  width: 100%;
  height: 140px;
  object-fit: cover;
  border-radius: 6px;
}

.series-title {
  font-weight: bold;
  font-size: 13px;
  margin-top: 5px;
}

/* ===== 巻一覧 ===== */
.volume {
  display: flex;
  gap: 10px;
  margin-bottom: 10px;
}

.volume img {
  width: 50px;
  height: 70px;
  object-fit: cover;
  border-radius: 4px;
}

/* ===== タブ ===== */
.tabbar {
  position: fixed;
  bottom: 0;
  width: 100%;
  display: flex;
  background: #222;
}

.tabbar button {
  flex: 1;
  padding: 12px;
  background: none;
  border: none;
  color: white;
}
</style>
</head>

<body>

<h2>📚 蔵書アプリ</h2>

<!-- ======================
📷 スキャン画面
====================== -->
<div id="scanPage" class="page active">

  <button id="startBtn">カメラ起動</button>

  <select id="location">
    <option value="自宅">自宅</option>
    <option value="実家">実家</option>
  </select>

  <select id="type">
    <option value="商業誌">商業誌</option>
    <option value="同人誌">同人誌</option>
  </select>

  <video id="video" autoplay playsinline></video>
  <div id="result"></div>

  <hr>

  <h3>手動登録</h3>
  <input id="manualTitle" placeholder="タイトル">
  <input id="manualAuthor" placeholder="著者">
  <button onclick="manualAdd()">登録</button>
</div>

<!-- ======================
📚 本棚（シリーズ）
====================== -->
<div id="shelfPage" class="page">

  <!-- フィルター復活 -->
  <div class="filter">
    <select id="f_status">
      <option value="all">すべて</option>
      <option value="未読">未読</option>
      <option value="読了">読了</option>
    </select>

    <select id="f_type">
      <option value="all">すべて</option>
      <option value="商業誌">商業誌</option>
      <option value="同人誌">同人誌</option>
    </select>

    <select id="f_location">
      <option value="all">すべて</option>
      <option value="自宅">自宅</option>
      <option value="実家">実家</option>
    </select>
  </div>

  <div id="seriesGrid" class="grid"></div>
</div>

<!-- ======================
📖 巻詳細
====================== -->
<div id="detailPage" class="page">
  <button onclick="back()">← 戻る</button>
  <div id="volumeList"></div>
</div>

<!-- タブ -->
<div class="tabbar">
  <button onclick="show('scanPage')">📷</button>
  <button onclick="show('shelfPage')">📚</button>
</div>

<script src="https://unpkg.com/@zxing/library@latest"></script>

<script>
const GAS_URL = "https://script.google.com/macros/s/AKfycbxulcJMiF65Dw9_dftVUUdk3tdGllap7EnaGFsWZ2N8lyy48BmM2AuurdC3f2LcnJr1gQ/exec";

let books = [];
let lastISBN = "";
let lastTime = 0;

/* ======================
画面切替
====================== */
function show(id){
  document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"));
  document.getElementById(id).classList.add("active");

  if(id==="shelfPage") loadBooks();
}

/* ======================
データ取得
====================== */
async function loadBooks(){
  const res = await fetch(GAS_URL);
  books = await res.json();
  renderSeries();
}

/* ======================
フィルター
====================== */
function getFiltered(){
  const s = document.getElementById("f_status").value;
  const t = document.getElementById("f_type").value;
  const l = document.getElementById("f_location").value;

  return books.filter(b =>
    (s==="all"||b.status===s) &&
    (t==="all"||b.type===t) &&
    (l==="all"||b.location===l)
  );
}

/* ======================
シリーズまとめ
====================== */
function renderSeries(){
  const data = getFiltered();

  const map = {};
  data.forEach(b=>{
    const key = b.series?.trim() || "その他";
    if(!map[key]) map[key]=[];
    map[key].push(b);
  });

  document.getElementById("seriesGrid").innerHTML =
    Object.keys(map).map(k=>{
      const items = map[k];
      return `
        <div class="series-card" onclick="openSeries('${k}')">
          <img src="${items[0].thumbnail || 'https://via.placeholder.com/200'}">
          <div class="series-title">${k}</div>
        </div>
      `;
    }).join("");
}

/* ======================
巻表示
====================== */
function openSeries(series){
  const items = books
    .filter(b=>b.series===series)
    .sort((a,b)=>Number(a.volume)-Number(b.volume));

  document.getElementById("volumeList").innerHTML =
    items.map(b=>`
      <div class="volume">
        <img src="${b.thumbnail || ''}">
        <div>${b.volume||""}巻 ${b.title}</div>
      </div>
    `).join("");

  show("detailPage");
}

/* ======================
戻る
====================== */
function back(){
  show("shelfPage");
}

/* ======================
登録
====================== */
async function send(p){
  await fetch(GAS_URL,{
    method:"POST",
    headers:{"Content-Type":"application/x-www-form-urlencoded"},
    body:new URLSearchParams(p)
  });
  loadBooks();
}

/* 手動 */
function manualAdd(){
  send({
    title:manualTitle.value,
    author:manualAuthor.value,
    location:location.value,
    type:type.value,
    isbn:""
  });
}

/* ======================
カメラ
====================== */
document.getElementById("startBtn").onclick=async()=>{
  const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
  video.srcObject = stream;

  const reader = new ZXing.BrowserMultiFormatReader();

  reader.decodeFromVideoDevice(null,video,async(res)=>{
    if(!res)return;

    const isbn=res.getText();
    const now=Date.now();
    if(isbn===lastISBN&&now-lastTime<5000)return;

    lastISBN=isbn;
    lastTime=now;

    const book=await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`)
      .then(r=>r.json())
      .then(d=>d.items?.[0]?.volumeInfo);

    if(!book)return;

    result.textContent=book.title;

    send({
      isbn,
      title:book.title,
      author:book.authors?.join(","),
      publisher:book.publisher,
      thumbnail:book.imageLinks?.thumbnail,
      location:location.value,
      type:type.value
    });
  });
};

</script>

  if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("sw.js");
}
</body>
</html>
