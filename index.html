<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ISBNスキャナー</title>

  <style>
    body {
      font-family: sans-serif;
      text-align: center;
      padding: 10px;
    }

    video {
      width: 100%;
      max-width: 400px;
      border: 1px solid #ccc;
      margin-top: 10px;
    }

    button {
      font-size: 18px;
      padding: 10px 20px;
      margin: 10px;
    }

    #result {
      font-size: 20px;
      margin-top: 10px;
      color: green;
      word-break: break-all;
    }
  </style>
</head>

<body>
  <h2>ISBNバーコードスキャナー</h2>

  <button id="startBtn">カメラ起動</button>

  <video id="video" autoplay playsinline></video>

  <div id="result">未スキャン</div>

  <script src="https://unpkg.com/@zxing/library@latest"></script>

  <script>
    const startBtn = document.getElementById('startBtn');
    const video = document.getElementById('video');
    const result = document.getElementById('result');

    let codeReader;
    let stream;

    // 🔥 あなたのGAS URL
    const GAS_URL = "https://script.google.com/macros/s/AKfycbxA4YkexgRVFM6hKhtnv986eeyXHEMZkOyBK86Vli8yxPoJNl_fz7D-G8IbRb1PGjSKJg/exec";

    // スプレッドシート送信
async function sendToSheet(isbn) {
  try {
    const formData = new URLSearchParams();
    formData.append("isbn", isbn);

    const res = await fetch(GAS_URL, {
      method: "POST",
      body: formData
    });

    const text = await res.text();
    console.log("GASレスポンス:", text);

  } catch (err) {
    console.error("送信失敗:", err);
  }
}

    startBtn.addEventListener('click', async () => {
      try {
        stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: "environment" }
        });

        video.srcObject = stream;

        codeReader = new ZXing.BrowserMultiFormatReader();

        codeReader.decodeFromVideoDevice(
          null,
          video,
          (res, err) => {
            if (res) {
              const isbn = res.getText();
              result.textContent = "ISBN: " + isbn;

              sendToSheet(isbn);
            }
          }
        );

      } catch (err) {
        alert("カメラ起動失敗: " + err);
        console.error(err);
      }
    });

    // 🔥 3秒後にテスト送信（重要）
    setTimeout(() => {
      sendToSheet("TEST_ISBN_123");
    }, 3000);

  </script>
</body>
</html>
